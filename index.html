<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Event Scanner</h2>
<div id="reader" style="width:300px;"></div>
<div id="result"></div>

<script>

const backendURL = "https://script.google.com/macros/s/AKfycbzWJYX9TO2MzBWHCBHx8_zqgkTMfUop5FKJfbqJZZM5QtLfVOc4cq_iITbFRfRQkhWapQ/exec";

function onScanSuccess(decodedText) {

  fetch(backendURL, {
    method: "POST",
    body: decodedText
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("result").innerText = data;
  });

}

const scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 },
  false
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
